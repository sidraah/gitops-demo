apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-app

spec:
  replicas: 8

  selector:
    matchLabels:
      app: nginx-app

  template:
    metadata:
      labels:
        app: nginx-app

    spec:
      containers:
      - name: nginx

        image: nginx:1.26

        ports:
        - containerPort: 80
